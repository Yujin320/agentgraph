services:

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/dataagent
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "dataagent", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Override NEO4J_URI to use the Docker service name instead of localhost
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      # Persist workspace data (also covers workspaces/.chroma/ used by ChromaDB)
      - ./workspaces:/app/workspaces
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
